<!DOCTYPE html>
<!-- Unofficial tool. Not affiliated with or endorsed by Anthropic, Inc. -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 指示文ジェネレーター — speak</title>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3347;
    --accent:   #7c6af7;
    --accent2:  #f97316;
    --green:    #22d3a5;
    --blue:     #38bdf8;
    --text:     #e2e8f0;
    --muted:    #8892aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', 'Hiragino Sans', 'YuGothic', sans-serif;
    font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 12px 20px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    background: var(--surface);
  }
  .logo {
    width: 32px; height: 32px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
    background: linear-gradient(135deg, #38bdf8, #7c6af7);
  }
  .title-wrap h1 { font-size: 14px; font-weight: 600; }
  .title-wrap p  { font-size: 11px; color: var(--muted); }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left panel ── */
  #left-panel {
    width: 340px; flex-shrink: 0; overflow-y: auto; padding: 16px;
    border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px;
  }

  /* Category tabs */
  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-btn {
    padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer;
    text-align: center; transition: all .15s; display: flex; align-items: center; gap: 6px;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: rgba(124,106,247,.12); border-color: var(--accent); color: var(--accent); }

  /* Form */
  #form-area { display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--muted); }
  .field input, .field textarea, .field select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); padding: 8px 10px; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color .15s; resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  ::placeholder { color: var(--muted); opacity: .6; }

  /* Safety mode */
  .safety-row { display: flex; gap: 6px; }
  .safety-btn {
    flex: 1; padding: 7px 6px; border-radius: 7px; font-size: 11px; font-weight: 700;
    border: 1px solid var(--border); cursor: pointer; background: var(--surface2);
    color: var(--muted); text-align: center; transition: all .15s;
  }
  .safety-btn:hover { border-color: var(--accent); }
  .safety-btn.active-s0 { background: rgba(34,211,165,.12); border-color: var(--green); color: var(--green); }
  .safety-btn.active-s1 { background: rgba(251,191,36,.12); border-color: #fbbf24; color: #fbbf24; }
  .safety-btn.active-s2 { background: rgba(248,113,113,.12); border-color: #f87171; color: #f87171; }

  /* Generate button */
  #btn-gen {
    width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px;
    color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s;
  }
  #btn-gen:hover { opacity: .88; }

  /* ── Right panel ── */
  #right-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  #right-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #right-header h3 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .hdr-actions { display: flex; gap: 8px; }
  .action-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); cursor: pointer; background: var(--surface2);
    color: var(--muted); transition: all .15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text); }
  .action-btn.copy { color: var(--green); border-color: rgba(34,211,165,.4); }

  #output-box {
    flex: 1; padding: 18px; font-family: 'Cascadia Code','Consolas',monospace;
    font-size: 12px; line-height: 1.75; color: var(--text); overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
    background: var(--surface);
  }
  #output-box .placeholder { color: var(--muted); font-family: inherit; font-size: 13px; line-height: 1.8; }

  #tip-box {
    padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    background: var(--surface2);
  }
  #tip-box p { font-size: 11px; color: var(--muted); line-height: 1.6; }
  #tip-box strong { color: var(--accent); }

  /* ── Templates sidebar ── */
  #tmpl-section { flex-shrink: 0; }
  .tmpl-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .tmpl-tag {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 99px; font-size: 11px; cursor: pointer; transition: all .15s;
  }
  .tmpl-tag:hover { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">💬</div>
  <div class="title-wrap">
    <h1>speak — Claude Code 指示文ジェネレーター</h1>
    <p>やりたいことを日常語で入力 → Claude Code 用の指示文に変換</p>
  </div>
</header>

<div class="main">
  <!-- Left -->
  <div id="left-panel">

    <!-- Category -->
    <div>
      <div class="section-label">1. カテゴリを選ぶ</div>
      <div class="cat-grid">
        <button class="cat-btn active" id="cat-file" onclick="setCategory('file')">📂 ファイル整理</button>
        <button class="cat-btn" id="cat-doc" onclick="setCategory('doc')">📝 文書作成</button>
        <button class="cat-btn" id="cat-data" onclick="setCategory('data')">📊 データ加工</button>
        <button class="cat-btn" id="cat-search" onclick="setCategory('search')">🔍 調査・まとめ</button>
        <button class="cat-btn" id="cat-auto" onclick="setCategory('auto')">⚙️ 自動化</button>
        <button class="cat-btn" id="cat-other" onclick="setCategory('other')">💡 その他</button>
      </div>
    </div>

    <!-- Dynamic form -->
    <div>
      <div class="section-label">2. やりたいことを入力</div>
      <div id="form-area"></div>
    </div>

    <!-- Safety -->
    <div>
      <div class="section-label">3. 安全レベル</div>
      <div class="safety-row">
        <button class="safety-btn active-s0" id="safe-0" onclick="setSafety(0)">🟢 慎重<br><span style="font-size:9px;font-weight:400">毎回確認</span></button>
        <button class="safety-btn" id="safe-1" onclick="setSafety(1)">🟡 標準<br><span style="font-size:9px;font-weight:400">重要操作のみ</span></button>
        <button class="safety-btn" id="safe-2" onclick="setSafety(2)">🔴 自動<br><span style="font-size:9px;font-weight:400">確認なし</span></button>
      </div>
    </div>

    <!-- Templates -->
    <div id="tmpl-section">
      <div class="section-label">よく使うテンプレ</div>
      <div class="tmpl-grid" id="tmpl-grid"></div>
    </div>

    <!-- Generate -->
    <button id="btn-gen" onclick="generate()">指示文を生成 →</button>

  </div>

  <!-- Right -->
  <div id="right-panel">
    <div id="right-header">
      <h3>生成された指示文</h3>
      <div class="hdr-actions">
        <button class="action-btn copy" id="btn-copy" onclick="copyOutput()">コピー</button>
        <button class="action-btn" onclick="clearOutput()">クリア</button>
      </div>
    </div>
    <div id="output-box">
      <span class="placeholder">左のフォームを入力して「指示文を生成」ボタンを押してください。

Claude Code に貼り付けて Enter を押すだけで動きます。</span>
    </div>
    <div id="tip-box">
      <p id="tip-text">💡 <strong>ヒント：</strong>「慎重モード」を選ぶと、毎ステップ確認が入ります。はじめての操作は慎重モードがおすすめです。</p>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let category = 'file';
let safetyLevel = 0;

// ── Categories ────────────────────────────────────────────────────────────
const CATS = {
  file: {
    label: 'ファイル整理',
    fields: [
      { id:'folder',    label:'整理したいフォルダ',    ph:'デスクトップ / ダウンロード / 書類',   type:'input' },
      { id:'filetype',  label:'ファイルの種類',        ph:'PDF / Excel / 画像 / すべて',           type:'input' },
      { id:'action',    label:'何をしたいか',          ph:'フォルダ分け / リネーム / 削除 / 移動', type:'input' },
      { id:'detail',    label:'追加の希望（任意）',    ph:'例: 年月でフォルダを作りたい',          type:'textarea' },
    ],
  },
  doc: {
    label: '文書作成',
    fields: [
      { id:'doctype',   label:'作りたいもの',          ph:'報告書 / 提案書 / メール / 議事録',     type:'input' },
      { id:'purpose',   label:'目的',                  ph:'例: 上司への月次報告',                  type:'input' },
      { id:'source',    label:'参考にするファイル（任意）', ph:'例: data.xlsx / メモ.txt',         type:'input' },
      { id:'detail',    label:'補足・希望',            ph:'例: 箇条書きで3ページ以内',             type:'textarea' },
    ],
  },
  data: {
    label: 'データ加工',
    fields: [
      { id:'filename',  label:'対象ファイル',          ph:'売上.xlsx / 顧客リスト.csv など',       type:'input' },
      { id:'task',      label:'何をしたいか',          ph:'重複削除 / 並び替え / 集計 / グラフ化', type:'input' },
      { id:'output',    label:'出力の希望',            ph:'新しいファイルに保存 / 元ファイルを上書き', type:'input' },
      { id:'detail',    label:'追加の条件（任意）',    ph:'例: A列が空白の行は除く',               type:'textarea' },
    ],
  },
  search: {
    label: '調査・まとめ',
    fields: [
      { id:'topic',     label:'調べたいテーマ',        ph:'例: 競合他社の料金比較',                type:'input' },
      { id:'source',    label:'参考にするもの（任意）',ph:'例: 添付のPDF / Webで調べて',           type:'input' },
      { id:'format',    label:'まとめの形式',          ph:'箇条書き / 表 / 段落 / Markdown',       type:'input' },
      { id:'detail',    label:'追加の希望（任意）',    ph:'例: 5点以内でまとめて',                 type:'textarea' },
    ],
  },
  auto: {
    label: '自動化',
    fields: [
      { id:'task',      label:'自動化したいこと',      ph:'例: 毎月の請求書をPDF化してメール送付', type:'textarea', rows: 3 },
      { id:'freq',      label:'実行のタイミング',      ph:'毎月1日 / 毎週月曜 / 手動で実行',       type:'input' },
      { id:'detail',    label:'条件・制約（任意）',    ph:'例: エラーが出たら止まって報告',        type:'textarea' },
    ],
  },
  other: {
    label: 'その他',
    fields: [
      { id:'want',      label:'やりたいことを日常語で', ph:'例: 散らかった写真を整理したい',       type:'textarea', rows: 4 },
      { id:'files',     label:'関係するファイル（任意）', ph:'ファイル名や場所',                   type:'input' },
      { id:'detail',    label:'追加の希望（任意）',    ph:'どんな形の結果が欲しいか',              type:'textarea' },
    ],
  },
};

const TEMPLATES = [
  { label:'デスクトップを整理',   cat:'file',   vals:{ folder:'デスクトップ', filetype:'すべて', action:'種類ごとにフォルダ分け', detail:'' } },
  { label:'請求書PDFを月別に',    cat:'file',   vals:{ folder:'書類フォルダ', filetype:'PDF',   action:'月別フォルダに整理', detail:'ファイル名に日付が含まれている' } },
  { label:'Excelの重複を削除',    cat:'data',   vals:{ filename:'リスト.xlsx', task:'重複行を削除', output:'新しいファイルに保存', detail:'' } },
  { label:'画像をリサイズ',       cat:'auto',   vals:{ task:'フォルダ内の画像を1280px幅にリサイズ', freq:'手動で実行', detail:'元のファイルは残す' } },
  { label:'複数PDFをひとつに',    cat:'auto',   vals:{ task:'フォルダ内の複数PDFを1つのPDFにまとめる', freq:'手動で実行', detail:'' } },
  { label:'週次報告書を作成',     cat:'doc',    vals:{ doctype:'週次報告書', purpose:'チームへの進捗共有', source:'タスクリスト.txt', detail:'箇条書きで1ページ以内' } },
  { label:'CSVを見やすく整形',    cat:'data',   vals:{ filename:'data.csv', task:'列を整理して見やすく', output:'新しいExcelファイルに保存', detail:'' } },
  { label:'ダウンロードを整理',   cat:'file',   vals:{ folder:'ダウンロード', filetype:'すべて', action:'種類ごとにフォルダ分け', detail:'3ヶ月以上前のファイルは「古い」フォルダへ' } },
];

// ── Category switching ────────────────────────────────────────────────────
function setCategory(cat) {
  category = cat;
  Object.keys(CATS).forEach(k => {
    document.getElementById('cat-' + k).classList.toggle('active', k === cat);
  });
  renderForm();
  renderTemplates();
}

function renderForm() {
  const def = CATS[category];
  const area = document.getElementById('form-area');
  area.innerHTML = def.fields.map(f => {
    if (f.type === 'textarea') {
      const rows = f.rows || 2;
      return `<div class="field">
        <label>${f.label}</label>
        <textarea id="f-${f.id}" placeholder="${esc(f.ph)}" style="min-height:${rows*24+16}px" oninput="autoGen()"></textarea>
      </div>`;
    }
    return `<div class="field">
      <label>${f.label}</label>
      <input type="text" id="f-${f.id}" placeholder="${esc(f.ph)}" oninput="autoGen()">
    </div>`;
  }).join('');
}

function renderTemplates() {
  const grid = document.getElementById('tmpl-grid');
  grid.innerHTML = TEMPLATES.map((t, i) =>
    `<span class="tmpl-tag" onclick="applyTemplate(${i})">${t.label}</span>`
  ).join('');
}

function applyTemplate(i) {
  const t = TEMPLATES[i];
  setCategory(t.cat);
  const def = CATS[t.cat];
  def.fields.forEach(f => {
    const el = document.getElementById('f-' + f.id);
    if (el) el.value = t.vals[f.id] || '';
  });
  generate();
}

// ── Safety ────────────────────────────────────────────────────────────────
function setSafety(level) {
  safetyLevel = level;
  [0,1,2].forEach(i => {
    const btn = document.getElementById('safe-' + i);
    btn.className = 'safety-btn' + (i === level ? ` active-s${i}` : '');
  });
  autoGen();
}

// ── Collect values ────────────────────────────────────────────────────────
function collectVals() {
  const vals = {};
  CATS[category].fields.forEach(f => {
    const el = document.getElementById('f-' + f.id);
    vals[f.id] = el ? el.value.trim() : '';
  });
  return vals;
}

// ── Template generation (no API) ──────────────────────────────────────────
function buildInstruction(cat, vals, safety) {
  const safetyNote = ['毎ステップで必ず確認を取る', '重要な操作のみ確認を取る', '確認なしで進める（上級者向け）'][safety];
  const safetyStep = safety === 0
    ? '\n- 各ステップで必ず承認を待つ\n- 不明な点があれば先に進まず確認する'
    : safety === 1
    ? '\n- ファイルの変更・削除のみ確認を取る'
    : '\n- 確認なしで進める';

  const confirmStep = safety < 2
    ? '1. まず対象の一覧・現状を表示して確認する\n' : '';

  if (cat === 'file') {
    const folder   = vals.folder   || '指定フォルダ';
    const filetype = vals.filetype || 'ファイル';
    const action   = vals.action   || '整理';
    const detail   = vals.detail   ? `\n- ${vals.detail}` : '';
    return `## タスク
${folder} の ${filetype} を${action}する

## 対象
${folder} 内の ${filetype}

## 手順（${safetyNote}）
${confirmStep}2. ${action}の案を提示する
3. 承認を得てから実行する
4. 完了したファイル数と結果を報告する

## 注意
- 元のファイルは削除しない（移動のみ）${safetyStep}
- 処理前後のファイル数を確認する${detail}`;
  }

  if (cat === 'data') {
    const filename = vals.filename || '対象ファイル';
    const task     = vals.task     || '加工';
    const output   = vals.output   || '新しいファイルに保存';
    const detail   = vals.detail   ? `\n- ${vals.detail}` : '';
    return `## タスク
${filename} を${task}する

## 対象
${filename}

## 手順（${safetyNote}）
${confirmStep}2. ${task}の処理内容を説明する
3. 承認を得てから実行する
4. 処理結果（件数・変更内容）を報告する

## 出力
${output}

## 注意
- 元のファイルは上書きしない（${output}）${safetyStep}
- 処理前後のデータ件数を確認する${detail}`;
  }

  if (cat === 'doc') {
    const doctype = vals.doctype || '文書';
    const purpose = vals.purpose || '作成';
    const source  = vals.source  ? `\n参考ファイル: ${vals.source}` : '';
    const detail  = vals.detail  ? `\n\n## 希望\n${vals.detail}` : '';
    return `## タスク
${purpose}のための${doctype}を作成する

## 目的
${purpose}${source}

## 手順（${safetyNote}）
${confirmStep}2. 構成案（見出し一覧）を先に提示する
3. 承認を得てから本文を作成する
4. 作成した内容を確認してもらう

## 注意
- 既存ファイルは上書きしない${safetyStep}${detail}`;
  }

  if (cat === 'search') {
    const topic  = vals.topic  || 'テーマ';
    const source = vals.source ? `\n参考: ${vals.source}` : '';
    const format = vals.format || '箇条書き';
    const detail = vals.detail ? `\n\n## 条件\n${vals.detail}` : '';
    return `## タスク
${topic}を調査してまとめる

## テーマ
${topic}${source}

## 手順（${safetyNote}）
${confirmStep}2. 調査方針を説明する
3. ${format}形式でまとめる
4. 不明点・推測が含まれる場合は明記する${detail}`;
  }

  if (cat === 'auto') {
    const task   = vals.task   || '自動化タスク';
    const freq   = vals.freq   || '手動実行';
    const detail = vals.detail ? `\n\n## 条件・制約\n${vals.detail}` : '';
    return `## タスク
以下を自動化する: ${task}

## 実行タイミング
${freq}

## 手順（${safetyNote}）
${confirmStep}2. 自動化の方法・ステップを説明する
3. スクリプト（コード）を作成して内容を確認してもらう
4. 承認後に実行またはファイルとして保存する
5. 動作確認し結果を報告する

## 注意
- 既存データは削除しない${safetyStep}${detail}`;
  }

  // other
  const want   = vals.want   || 'やりたいこと';
  const files  = vals.files  ? `\n関係ファイル: ${vals.files}` : '';
  const detail = vals.detail ? `\n\n## 希望する形\n${vals.detail}` : '';
  return `## タスク
${want}${files}

## 手順（${safetyNote}）
${confirmStep}2. 何をするかを説明してから進める
3. 重要な操作の前に確認を取る
4. 完了後に結果を報告する

## 注意
- ファイルの削除・上書きは事前に確認する${safetyStep}${detail}`;
}

// ── Auto generate on input ────────────────────────────────────────────────
function autoGen() {
  const vals = collectVals();
  const hasInput = Object.values(vals).some(v => v.length > 0);
  if (!hasInput) return;
  showOutput(buildInstruction(category, vals, safetyLevel));
}

function generate() {
  const vals = collectVals();
  showOutput(buildInstruction(category, vals, safetyLevel));
}

function showOutput(text) {
  const box = document.getElementById('output-box');
  box.textContent = text;
  box.style.color = 'var(--text)';
  updateTip();
}

function clearOutput() {
  document.getElementById('output-box').innerHTML = '<span class="placeholder">左のフォームを入力して「指示文を生成」ボタンを押してください。\n\nClaude Code に貼り付けて Enter を押すだけで動きます。</span>';
}

function updateTip() {
  const tips = [
    '🟢 <strong>慎重モード：</strong>毎ステップ確認が入ります。はじめての操作にはこちらがおすすめです。',
    '🟡 <strong>標準モード：</strong>ファイルの変更・削除のみ確認が入ります。',
    '🔴 <strong>自動モード：</strong>確認なしで進みます。操作に慣れた方向けです。',
  ];
  document.getElementById('tip-text').innerHTML = '💡 ' + tips[safetyLevel];
}

// ── Copy ──────────────────────────────────────────────────────────────────
function copyOutput() {
  const text = document.getElementById('output-box').textContent;
  const btn  = document.getElementById('btn-copy');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ コピー済み';
    btn.style.background = 'var(--green)';
    btn.style.color = 'var(--bg)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
      btn.style.color = 'var(--green)';
    }, 2000);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────
renderForm();
renderTemplates();
</script>
